<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<meta name="description" content="A color memory game — memorize, recreate, and score. 3 rounds, 30 seconds of pure color instinct.">
<meta property="og:title" content="WHAT'S NEXT — Color Memory Game">
<meta property="og:description" content="Memorize a color, recreate it with HSL sliders, and test your color instinct across 3 rounds.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<title>WHAT'S NEXT</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Michroma&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#0a0a0a;
  font-family:'Space Grotesk','Inter',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;
  color:#f5f5f5;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
  touch-action:manipulation;
}
body{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

/* ===== Countdown Timer ===== */
.countdown{
  position:fixed;
  top:calc(20px + env(safe-area-inset-top));
  right:calc(20px + env(safe-area-inset-right));
  z-index:200;
  font-size:40px;
  font-weight:600;
  font-variant-numeric:tabular-nums;
  letter-spacing:4px;
  color:#f5f5f5;
  line-height:1;
  opacity:1;
  transition:opacity .25s;
}

/* ===== Full-screen Color Background ===== */
.color-bg{
  position:fixed;inset:0;
  z-index:1;
  transition:background-color .1s ease-out;
}
.color-bg.hidden{display:none!important}

/* ===== Overlay Content Layer ===== */
.overlay{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100%;height:100%;
  padding:calc(70px + env(safe-area-inset-top)) 20px calc(30px + env(safe-area-inset-bottom));
}

/* ===== Start Screen ===== */
.start-screen{
  position:fixed;
  top:28vh;left:50%;
  transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;
  text-align:center;
  max-width:360px;
  width:100%;
  padding:0 24px;
}
.start-screen .logo{
  font-family:'Michroma','Space Grotesk',sans-serif;
  font-size:36px;font-weight:400;letter-spacing:4px;
  text-transform:uppercase;
  background:linear-gradient(135deg,#f5f5f5 0%,rgba(245,245,245,.5) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:32px;
  line-height:1.1;
}
.start-screen .rules{
  font-size:15px;line-height:1.6;
  color:rgba(245,245,245,.5);
  font-weight:300;
  min-height:80px;
  margin-bottom:32px;
}

/* ===== Memorize Hint ===== */
.memorize-hint{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:20;
  font-size:16px;font-weight:500;
  color:rgba(245,245,245,.6);
  letter-spacing:1px;
  opacity:0;
  transition:opacity .3s;
  pointer-events:none;
}
.memorize-hint.show{opacity:1}

/* ===== Tune Controls ===== */
.tune-controls{
  position:fixed;
  bottom:0;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  width:100%;
  padding:0 24px calc(40px + env(safe-area-inset-bottom));
  z-index:50;
}
.sliders{width:100%;max-width:400px;display:flex;flex-direction:column;gap:28px}
.slider-group{display:flex;flex-direction:column;gap:10px}
.slider-label{
  display:flex;justify-content:space-between;align-items:center;
  font-size:13px;color:rgba(245,245,245,.5);
  text-transform:uppercase;letter-spacing:1px;font-weight:500;
}
.slider-label .val{
  font-variant-numeric:tabular-nums;
  color:rgba(245,245,245,.8);
  font-weight:600;
  font-size:14px;
}
input[type=range]{
  -webkit-appearance:none;appearance:none;
  width:100%;height:8px;border-radius:4px;
  outline:none;
}
#sliderH{
  background:linear-gradient(to right,
    hsl(0,100%,50%),hsl(60,100%,50%),hsl(120,100%,50%),
    hsl(180,100%,50%),hsl(240,100%,50%),hsl(300,100%,50%),
    hsl(360,100%,50%));
}
#sliderS{background:linear-gradient(to right,#808080,#f5f5f5)}
#sliderL{background:linear-gradient(to right,#0a0a0a,#808080,#f5f5f5)}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:28px;height:28px;border-radius:50%;
  background:#f5f5f5;
  box-shadow:0 2px 10px rgba(0,0,0,.4);
  cursor:pointer;
  border:2px solid rgba(0,0,0,.1);
}
input[type=range]::-moz-range-thumb{
  width:28px;height:28px;border-radius:50%;border:2px solid rgba(0,0,0,.1);
  background:#f5f5f5;
  box-shadow:0 2px 10px rgba(0,0,0,.4);
  cursor:pointer;
}

/* ===== Buttons ===== */
.btn{
  margin-top:24px;
  min-width:160px;min-height:52px;
  padding:16px 40px;
  border:none;border-radius:14px;
  background:#f5f5f5;color:#0a0a0a;
  font-family:inherit;
  font-size:15px;font-weight:600;letter-spacing:1.5px;
  text-transform:uppercase;
  cursor:pointer;
  transition:opacity .15s,transform .1s;
}
.btn:active{opacity:.7;transform:scale(.97)}
.btn-start{
  font-size:16px;
  padding:18px 56px;
  border-radius:16px;
  letter-spacing:2.5px;
}

/* ===== Result / Final Screen ===== */
.result-screen{
  display:flex;flex-direction:column;align-items:center;
  text-align:center;gap:10px;
  background:rgba(10,10,10,.8);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-radius:20px;
  padding:36px 32px 32px;
  box-shadow:0 8px 40px rgba(0,0,0,.5);
  border:1px solid rgba(245,245,245,.06);
  max-width:360px;width:100%;
}
.result-screen .label{
  font-size:12px;color:rgba(245,245,245,.35);
  text-transform:uppercase;letter-spacing:1.5px;font-weight:500;
}
.result-screen .score-value{
  font-size:64px;font-weight:700;
  font-variant-numeric:tabular-nums;
  line-height:1.1;letter-spacing:-1px;
}
.result-screen .score-detail{
  font-size:12px;color:rgba(245,245,245,.3);
  margin-top:2px;font-weight:300;
}
.result-screen .color-compare{
  display:flex;align-items:center;gap:10px;
  margin-top:12px;
}
.result-screen .color-swatch{
  width:40px;height:40px;border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.result-screen .color-arrow{
  font-size:14px;color:rgba(245,245,245,.25);
}
.result-screen .total-breakdown{
  font-size:13px;color:rgba(245,245,245,.45);
  margin-top:8px;font-weight:400;letter-spacing:.3px;
}

/* ===== Utility ===== */
.hide{display:none!important}
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.cursor{
  display:inline-block;
  animation:blink .6s step-end infinite;
  color:rgba(245,245,245,.4);
  font-weight:300;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>

<div class="countdown hide" id="countdown" aria-live="polite" aria-label="Countdown timer"></div>
<div class="color-bg hidden" id="colorBg" role="presentation"></div>
<div class="memorize-hint" id="memorizeHint">Remember this color</div>

<div class="overlay" id="overlay">

  <!-- Start Screen -->
  <div class="start-screen" id="startScreen">
    <div class="logo" role="heading" aria-level="1">WHAT'S NEXT</div>
    <div class="rules" id="rulesText" aria-live="polite"></div>
    <button class="btn btn-start hide" id="startBtn">Start</button>
  </div>

  <!-- Tune Controls -->
  <div class="tune-controls hide" id="tuneControls" role="group" aria-label="Color adjustment sliders">
    <div class="sliders">
      <div class="slider-group">
        <div class="slider-label"><span>Hue</span><span class="val" id="hVal">0</span></div>
        <input type="range" id="sliderH" min="0" max="360" value="0" aria-label="Hue">
      </div>
      <div class="slider-group">
        <div class="slider-label"><span>Saturation</span><span class="val" id="sVal">50</span></div>
        <input type="range" id="sliderS" min="0" max="100" value="50" aria-label="Saturation">
      </div>
      <div class="slider-group">
        <div class="slider-label"><span>Lightness</span><span class="val" id="lVal">50</span></div>
        <input type="range" id="sliderL" min="0" max="100" value="50" aria-label="Lightness">
      </div>
    </div>
    <button class="btn" id="confirmBtn">Confirm</button>
  </div>

  <!-- Result Screen -->
  <div class="result-screen hide" id="resultScreen">
    <div class="label">Round Score</div>
    <div class="score-value" id="scoreValue">0.00</div>
    <div class="color-compare" id="colorCompare">
      <div class="color-swatch" id="swatchTarget"></div>
      <span class="color-arrow">→</span>
      <div class="color-swatch" id="swatchPlayer"></div>
    </div>
    <div class="score-detail" id="scoreDetail"></div>
    <button class="btn" id="nextBtn">Next</button>
  </div>

  <!-- Final Screen -->
  <div class="result-screen hide" id="finalScreen">
    <div class="label">Game Over</div>
    <div class="score-value" id="finalScore">0.00</div>
    <div class="total-breakdown" id="totalBreakdown"></div>
    <button class="btn" id="restartBtn">Play Again</button>
  </div>

</div>

<script>
/* ============================================================
   WHAT'S NEXT — Color Memory Game
   A single-file H5 game. No dependencies.
   ============================================================ */

'use strict';

/* ---- Constants ---- */
const TOTAL_ROUNDS  = 3;
const MEMORIZE_MS   = 3000;
const TUNE_MS       = 15000;
const MAX_RGB_DIST  = 44.167;   // normalizer for 0–10 scoring
const TYPEWRITER_MS = 5000;

/* ---- DOM Cache ---- */
const $ = (id) => document.getElementById(id);
const dom = {
  countdown:    $('countdown'),
  colorBg:      $('colorBg'),
  memorizeHint: $('memorizeHint'),
  startScreen:  $('startScreen'),
  startBtn:     $('startBtn'),
  tuneControls: $('tuneControls'),
  confirmBtn:   $('confirmBtn'),
  resultScreen: $('resultScreen'),
  scoreValue:   $('scoreValue'),
  scoreDetail:  $('scoreDetail'),
  colorCompare: $('colorCompare'),
  swatchTarget: $('swatchTarget'),
  swatchPlayer: $('swatchPlayer'),
  nextBtn:      $('nextBtn'),
  finalScreen:  $('finalScreen'),
  finalScore:   $('finalScore'),
  totalBreakdown: $('totalBreakdown'),
  restartBtn:   $('restartBtn'),
  sliderH:      $('sliderH'),
  sliderS:      $('sliderS'),
  sliderL:      $('sliderL'),
  hVal:         $('hVal'),
  sVal:         $('sVal'),
  lVal:         $('lVal'),
  rulesText:    $('rulesText'),
};

/* ============================================================
   Color Utilities
   ============================================================ */

/**
 * Convert HSL to RGB.
 * @param {number} h  Hue 0–360
 * @param {number} s  Saturation 0–100
 * @param {number} l  Lightness 0–100
 * @returns {{r:number, g:number, b:number}}  Each channel 0–255
 */
function hslToRgb(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s = Math.min(Math.max(s, 0), 100) / 100;
  l = Math.min(Math.max(l, 0), 100) / 100;

  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = l - c / 2;

  let r, g, b;
  if      (h < 60)  { r = c; g = x; b = 0; }
  else if (h < 120) { r = x; g = c; b = 0; }
  else if (h < 180) { r = 0; g = c; b = x; }
  else if (h < 240) { r = 0; g = x; b = c; }
  else if (h < 300) { r = x; g = 0; b = c; }
  else              { r = c; g = 0; b = x; }

  return {
    r: Math.round((r + m) * 255),
    g: Math.round((g + m) * 255),
    b: Math.round((b + m) * 255),
  };
}

/**
 * Score player's color vs. target using RGB Euclidean distance.
 * Returns 0.00–10.00 (higher = closer match).
 */
function calcScore(target, player) {
  const t = hslToRgb(target.h, target.s, target.l);
  const p = hslToRgb(player.h, player.s, player.l);
  const d = Math.sqrt(
    (t.r - p.r) ** 2 +
    (t.g - p.g) ** 2 +
    (t.b - p.b) ** 2
  );
  return Math.round(Math.max(0, 10 - d / MAX_RGB_DIST) * 100) / 100;
}

/**
 * Generate a random, visually distinct color.
 * Avoids extremely dark / light / desaturated colors.
 */
function randomColor() {
  return {
    h: Math.floor(Math.random() * 360),
    s: 30 + Math.floor(Math.random() * 60),   // 30–89
    l: 30 + Math.floor(Math.random() * 40),    // 30–69
  };
}

/* ============================================================
   Game State
   ============================================================ */

const game = {
  round: 0,
  scores: [],
  target: null,
  phase: 'start',   // start | memorize | tune | result | final
};

let timerEnd = 0;
let timerRAF = null;

/* ============================================================
   UI Helpers
   ============================================================ */

function hideAll() {
  dom.startScreen.classList.add('hide');
  dom.tuneControls.classList.add('hide');
  dom.resultScreen.classList.add('hide');
  dom.finalScreen.classList.add('hide');
  dom.colorBg.classList.add('hidden');
  dom.memorizeHint.classList.remove('show');
  dom.countdown.classList.add('hide');
  cancelAnimationFrame(timerRAF);
}

/** Animate a number from `from` to `to` with ease-out cubic. */
function animateNumber(el, from, to, durationMs) {
  const start = performance.now();
  function step(now) {
    const t = Math.min((now - start) / durationMs, 1);
    const ease = 1 - (1 - t) ** 3;
    el.textContent = (from + (to - from) * ease).toFixed(2);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

/**
 * 3-digit countdown display (e.g. 300→000 or 150→000).
 * Uses requestAnimationFrame + Date.now() for drift-free timing.
 */
function startCountdown(durationMs, maxDisplay, onEnd) {
  dom.countdown.classList.remove('hide');
  timerEnd = Date.now() + durationMs;

  function tick() {
    const remaining = Math.max(0, timerEnd - Date.now());
    const display = Math.round((remaining / durationMs) * maxDisplay);
    dom.countdown.textContent = String(Math.max(0, display)).padStart(3, '0');

    if (remaining > 0) {
      timerRAF = requestAnimationFrame(tick);
    } else {
      dom.countdown.textContent = '000';
      setTimeout(onEnd, 120);
    }
  }
  tick();
}

/** Get current slider values as an HSL object. */
function getPlayerHSL() {
  return {
    h: +dom.sliderH.value,
    s: +dom.sliderS.value,
    l: +dom.sliderL.value,
  };
}

/** Update fullscreen background color & dynamic slider gradients. */
function updatePreview() {
  const { h, s, l } = getPlayerHSL();
  dom.hVal.textContent = h;
  dom.sVal.textContent = s;
  dom.lVal.textContent = l;

  // Fullscreen color background
  dom.colorBg.style.backgroundColor = `hsl(${h},${s}%,${l}%)`;

  // Dynamic saturation gradient: grey → fully saturated
  dom.sliderS.style.background =
    `linear-gradient(to right,hsl(${h},0%,${l}%),hsl(${h},100%,${l}%))`;

  // Dynamic lightness gradient: black → mid → white
  dom.sliderL.style.background =
    `linear-gradient(to right,#0a0a0a,hsl(${h},${s}%,50%),#f5f5f5)`;
}

/* ============================================================
   Game Phases
   ============================================================ */

function showStart() {
  game.phase = 'start';
  hideAll();
  dom.startScreen.classList.remove('hide');
  dom.startScreen.classList.add('fade-in');
  typewriterEffect();
}

function startMemorize() {
  game.phase = 'memorize';
  game.target = randomColor();
  const { h, s, l } = game.target;
  hideAll();

  dom.colorBg.style.backgroundColor = `hsl(${h},${s}%,${l}%)`;
  dom.colorBg.classList.remove('hidden');
  dom.memorizeHint.classList.add('show');

  startCountdown(MEMORIZE_MS, 300, () => {
    if (game.phase === 'memorize') startTune();
  });
}

function startTune() {
  game.phase = 'tune';
  hideAll();

  // Show fullscreen color background for live preview
  dom.colorBg.classList.remove('hidden');

  // Reset sliders to neutral position
  dom.sliderH.value = 0;
  dom.sliderS.value = 50;
  dom.sliderL.value = 50;
  updatePreview();

  dom.tuneControls.classList.remove('hide');
  dom.tuneControls.classList.add('fade-in');

  startCountdown(TUNE_MS, 150, () => {
    if (game.phase === 'tune') finishTune();
  });
}

function finishTune() {
  // Guard: prevent double execution
  if (game.phase !== 'tune') return;
  game.phase = '_finishing';
  cancelAnimationFrame(timerRAF);

  const player = getPlayerHSL();
  const score = calcScore(game.target, player);
  game.scores.push(score);
  showResult(score, player);
}

function showResult(score, player) {
  game.phase = 'result';
  hideAll();

  dom.resultScreen.classList.remove('hide');
  dom.resultScreen.classList.add('fade-in');

  animateNumber(dom.scoreValue, 0, score, 600);

  // Show color comparison swatches
  const t = game.target;
  dom.swatchTarget.style.background =
    `hsl(${t.h},${t.s}%,${t.l}%)`;
  dom.swatchPlayer.style.background =
    `hsl(${player.h},${player.s}%,${player.l}%)`;

  dom.scoreDetail.textContent =
    `HSL(${t.h}, ${t.s}%, ${t.l}%)  →  HSL(${player.h}, ${player.s}%, ${player.l}%)`;

  dom.nextBtn.textContent =
    game.round < TOTAL_ROUNDS - 1 ? 'Next' : 'See Total';
}

function showFinal() {
  game.phase = 'final';
  hideAll();

  dom.finalScreen.classList.remove('hide');
  dom.finalScreen.classList.add('fade-in');

  const total = game.scores.reduce((a, b) => a + b, 0);
  animateNumber(dom.finalScore, 0, total, 800);

  dom.totalBreakdown.textContent =
    game.scores.map((s, i) => `R${i + 1}: ${s.toFixed(2)}`).join('   ');
}

/* ---- Game Flow ---- */

function startGame() {
  game.round  = 0;
  game.scores = [];
  startMemorize();
}

function nextRound() {
  game.round++;
  if (game.round >= TOTAL_ROUNDS) showFinal();
  else startMemorize();
}

/* ============================================================
   Typewriter Effect
   ============================================================ */

const RULES_TEXT = [
  'A color memory game in 3 rounds.',
  'Each round, a color appears for 3 seconds. After it disappears, you have 15 seconds to recreate it.',
  'Score is based on how close your color matches — up to 10.00 per round.',
].join('\n');

let typewriterTimer = null;

function typewriterEffect() {
  // Clear any previous typewriter run
  if (typewriterTimer) { clearTimeout(typewriterTimer); typewriterTimer = null; }
  dom.rulesText.innerHTML = '';
  dom.startBtn.classList.add('hide');

  let i = 0;
  const charDelay = TYPEWRITER_MS / RULES_TEXT.length;

  function type() {
    if (i < RULES_TEXT.length) {
      dom.rulesText.innerHTML =
        RULES_TEXT.substring(0, i + 1).replace(/\n/g, '<br>') +
        '<span class="cursor">|</span>';
      i++;
      typewriterTimer = setTimeout(type, charDelay);
    } else {
      dom.rulesText.innerHTML = RULES_TEXT.replace(/\n/g, '<br>');
      dom.startBtn.classList.remove('hide');
      dom.startBtn.classList.add('fade-in');
      typewriterTimer = null;
    }
  }
  type();
}

/* ============================================================
   Event Binding
   ============================================================ */

// Slider live update
dom.sliderH.addEventListener('input', updatePreview);
dom.sliderS.addEventListener('input', updatePreview);
dom.sliderL.addEventListener('input', updatePreview);

dom.startBtn.addEventListener('click', () => {
  if (game.phase === 'start') startGame();
});

dom.confirmBtn.addEventListener('click', () => {
  if (game.phase === 'tune') finishTune();
});

dom.nextBtn.addEventListener('click', nextRound);

dom.restartBtn.addEventListener('click', showStart);

// Prevent iOS rubber-band scroll (except on sliders)
document.addEventListener('touchmove', (e) => {
  if (e.target.tagName !== 'INPUT') e.preventDefault();
}, { passive: false });

/* ============================================================
   Init
   ============================================================ */

showStart();
</script>
</body>
</html>
